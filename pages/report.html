<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Report Issue | CityVUE</title>

    <link
        rel="stylesheet"
        href="../node_modules/bootstrap/dist/css/bootstrap.min.css">

    <link
        rel="stylesheet"
        href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">

    <link
        rel="stylesheet"
        href="../assets/css/styles.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a
class="navbar-brand fw-bold"
href="../index.html">

<i class="bi bi-buildings-fill me-2"></i>

CityVUE

</a>

</div>

</nav>

<main class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow">

<div class="card-header">

<h2 class="mb-0">

Report a Community Issue

</h2>

</div>

<div class="card-body">

<form id="issueForm">

<div class="mb-3">

<label class="form-label">

Issue Title

</label>

<input
type="text"
id="title"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Description

</label>

<textarea
id="description"
class="form-control"
rows="4"
required></textarea>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Category

</label>

<select
id="category"
class="form-select">

<option>Road</option>

<option>Lighting</option>

<option>Water</option>

<option>Garbage</option>

<option>Parks</option>

<option>Other</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Priority

</label>

<select
id="priority"
class="form-select">

<option>Low</option>

<option selected>Medium</option>

<option>High</option>

</select>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Reported By

</label>

<input
type="text"
id="reportedBy"
class="form-control"
required>

</div>

<div class="mb-4">

<label class="form-label">

Location

</label>

<input
type="text"
id="location"
class="form-control"
required>

</div>

<button
type="submit"
class="btn btn-primary">

<i class="bi bi-save me-2"></i>

Submit Issue

</button>

<a
href="../index.html"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</div>

</main>

<script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

<script
type="module"
src="../assets/js/pages/report.js"></script>

</body>

</html>
