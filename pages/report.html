<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Report Issue | CityVUE</title>



    <!-- Custom CSS -->
    <link
        rel="stylesheet"
        href="../assets/css/styles.css">

</head>

<body>

    <!-- ==================================================
         JavaScript Disabled Message
    =================================================== -->

    <noscript>

        <div
            class="alert alert-danger text-center rounded-0 m-0"
            role="alert">

            <strong>JavaScript Required:</strong>

            CityVUE requires JavaScript to function correctly.
            Please enable JavaScript in your browser.

        </div>

    </noscript>

    <!-- ==========================================
         Navigation
    =========================================== -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container">

            <a
                class="navbar-brand fw-bold"
                href="../index.html">

                <i class="bi bi-buildings-fill me-2"></i>

                CityVUE

            </a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div
                class="collapse navbar-collapse"
                id="navbarNav">

                <ul class="navbar-nav ms-auto align-items-lg-center">

                    <li class="nav-item">

                        <a
                            class="nav-link"
                            href="../index.html">

                            Home

                        </a>

                    </li>

                    <li class="nav-item">

                        <a
                            class="nav-link active"
                            aria-current="page"
                            href="./report.html">

                            Report Issue

                        </a>

                    </li>

                    <li class="nav-item">

                        <a
                            class="nav-link"
                            href="./issues.html">

                            Issue List

                        </a>

                    </li>

                    <li class="nav-item">

                        <a
                            class="nav-link"
                            href="./dashboard.html">

                            Dashboard

                        </a>

                    </li>

                    <li class="nav-item ms-lg-3 mt-2 mt-lg-0">

                        <button
                            id="themeToggle"
                            class="btn btn-outline-light btn-sm">

                            <i class="bi bi-moon-stars-fill me-1"></i>

                            Dark Mode

                        </button>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- ==========================================
         Main Content
    =========================================== -->

    <main class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-9">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">

                        <h2 class="mb-0">

                            <i class="bi bi-pencil-square me-2"></i>

                            Report a Community Issue

                        </h2>

                    </div>

                    <div class="card-body">

                        <form id="issueForm">

                            <!-- Issue Title -->

                            <div class="mb-3">

                                <label
                                    for="title"
                                    class="form-label">

                                    Issue Title

                                </label>

                                <input
                                    type="text"
                                    id="title"
                                    class="form-control"
                                    placeholder="Enter a short issue title"
                                    required>

                            </div>

                            <!-- Description -->

                            <div class="mb-3">

                                <label
                                    for="description"
                                    class="form-label">

                                    Description

                                </label>

                                <textarea
                                    id="description"
                                    class="form-control"
                                    rows="5"
                                    placeholder="Describe the issue in detail..."
                                    required></textarea>

                            </div>

                            <div class="row">

                                <!-- Category -->

                                <div class="col-md-6 mb-3">

                                    <label
                                        for="category"
                                        class="form-label">

                                        Category

                                    </label>

                                    <select
                                        id="category"
                                        class="form-select">

                                        <option value="Road">Road</option>
                                        <option value="Lighting">Lighting</option>
                                        <option value="Water">Water</option>
                                        <option value="Garbage">Garbage</option>
                                        <option value="Parks">Parks</option>
                                        <option value="Other">Other</option>

                                    </select>

                                </div>

                                <!-- Priority -->

                                <div class="col-md-6 mb-3">

                                    <label
                                        for="priority"
                                        class="form-label">

                                        Priority

                                    </label>

                                    <select
                                        id="priority"
                                        class="form-select">

                                        <option value="Low">Low</option>
                                        <option
                                            value="Medium"
                                            selected>

                                            Medium

                                        </option>

                                        <option value="High">High</option>

                                    </select>

                                </div>

                            </div>

                            <!-- Reported By -->

                            <div class="mb-3">

                                <label
                                    for="reportedBy"
                                    class="form-label">

                                    Reported By

                                </label>

                                <input
                                    type="text"
                                    id="reportedBy"
                                    class="form-control"
                                    placeholder="Enter your name"
                                    required>

                            </div>

                            <!-- Location -->

                            <div class="mb-4">

                                <label
                                    for="location"
                                    class="form-label">

                                    Location

                                </label>

                                <input
                                    type="text"
                                    id="location"
                                    class="form-control"
                                    placeholder="Enter the issue location"
                                    required>

                            </div>

                            <!-- Buttons -->

                            <div class="d-flex gap-2">

                                <button
                                    type="submit"
                                    class="btn btn-primary">

                                    <i class="bi bi-save me-2"></i>

                                    Submit Issue

                                </button>

                                <a
                                    href="./issues.html"
                                    class="btn btn-secondary">

                                    Cancel

                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <!-- ==========================================
         Toast Notification
    =========================================== -->

    <div class="toast-container position-fixed bottom-0 end-0 p-3">

        <div
            id="appToast"
            class="toast text-bg-success border-0"
            role="alert"
            aria-live="assertive"
            aria-atomic="true">

            <div class="d-flex">

                <div
                    id="toastMessage"
                    class="toast-body">

                    Success

                </div>

                <button
                    type="button"
                    class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"
                    aria-label="Close">
                </button>

            </div>

        </div>

    </div>

 <!-- ==================================================
         Footer
    =================================================== -->

    <footer class="border-top bg-body-tertiary py-4 mt-5">

        <div class="container">

            <div
                class="d-flex flex-column flex-md-row
                       justify-content-between align-items-center gap-2">

                <p class="text-body-secondary small mb-0">

                    &copy; 2026 CityVUE.
                    Resident Engagement Platform.

                </p>

                <a
                    class="small text-decoration-none"
                    href="./report.html">

                    Report a community issue

                </a>

            </div>

        </div>

    </footer>


    <!-- Report Page Script -->

    <script
        type="module"
        src="../assets/pages/report.js">
    </script>

</body>

</html>
